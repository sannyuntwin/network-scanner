<!DOCTYPE html>
<html>
<head>
    <title>Network Scanner Dashboard</title>

    <!-- Vis Network CDN -->
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            transition: 0.3s;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 255, 65, 0.03) 0px,
                    transparent 1px,
                    transparent 2px,
                    rgba(0, 255, 65, 0.03) 3px
                );
            pointer-events: none;
            z-index: 1;
        }

        .content-wrapper {
            position: relative;
            z-index: 2;
        }

        :root {
            --bg: #0a0e27;
            --text: #00ff41;
            --card: #0f1729;
            --border: #00ff41;
            --accent: #00d9ff;
        }

        .dark {
            --bg: #000000;
            --text: #00ff41;
            --card: #0a0a0a;
        }

        h1 {
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--text);
            font-size: 2em;
        }

        h3 {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 30px;
            margin-bottom: 10px;
            text-shadow: 0 0 8px var(--accent);
        }

        button {
            padding: 10px 20px;
            margin-right: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            background: transparent;
            border: 2px solid var(--text);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--text);
            transition: left 0.3s;
            z-index: -1;
        }

        button:hover::before {
            left: 0;
        }

        button:hover {
            color: var(--bg);
            box-shadow: 0 0 15px var(--text);
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-scan {
            border-color: var(--text);
        }

        .btn-scan::before {
            background: var(--text);
        }

        .btn-scan:hover {
            box-shadow: 0 0 20px var(--text);
        }

        .btn-theme {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-theme::before {
            background: var(--accent);
        }

        .btn-theme:hover {
            box-shadow: 0 0 20px var(--accent);
        }

        .btn-export {
            border-color: #ff0040;
            color: #ff0040;
        }

        .btn-export::before {
            background: #ff0040;
        }

        .btn-export:hover {
            box-shadow: 0 0 20px #ff0040;
        }

        table {
            width: 100%;
            background: var(--card);
            border-collapse: collapse;
            margin-top: 15px;
            border: 1px solid var(--border);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.3);
            text-align: left;
        }

        th {
            background: rgba(0, 255, 65, 0.1);
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            border-bottom: 2px solid var(--text);
        }

        tr:hover {
            background: rgba(0, 255, 65, 0.05);
        }

        #loading {
            display: none;
            font-weight: bold;
            color: var(--accent);
            margin-top: 10px;
        }

        .loading-container {
            margin-top: 20px;
            display: none;
        }

        .progress-bar-container {
            width: 100%;
            height: 30px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, 
                var(--text) 0%, 
                var(--accent) 50%, 
                var(--text) 100%);
            width: 0%;
            transition: width 0.3s ease;
            position: relative;
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -100% 0; }
            100% { background-position: 200% 0; }
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent);
            animation: loading-shine 1.5s infinite;
        }

        @keyframes loading-shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 5px #000, 0 0 10px var(--text);
            z-index: 10;
            mix-blend-mode: difference;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stats {
            margin-top: 15px;
            padding: 15px;
            background: var(--card);
            border: 1px solid var(--border);
            border-left: 4px solid var(--text);
            color: var(--text);
            font-size: 1.1em;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }

        #network {
            width: 100%;
            height: 450px;
            border: 2px solid var(--border);
            margin-top: 20px;
            background: var(--card);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="content-wrapper">

<h1>⚡ Network Scanner v1.0</h1>

<button class="btn-scan" onclick="startScan()">[ INIT SCAN ]</button>
<button class="btn-theme" onclick="toggleDark()">[ TOGGLE THEME ]</button>
<a href="/export" target="_blank">
    <button class="btn-export">[ EXPORT DATA ]</button>
</a>

<p id="loading">&gt;&gt; SCANNING NETWORK...</p>

<div class="loading-container" id="loading-container">
    <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
        <div class="progress-text" id="progress-text">0%</div>
    </div>
</div>

<div class="stats" id="stats"></div>

<h3>&gt; Network Topology</h3>
<div id="network"></div>

<h3>&gt; Device Registry</h3>
<table>
    <thead>
        <tr>
            <th>IP Address</th>
            <th>Hostname</th>
            <th>Device Type</th>
            <th>Open Ports</th>
            <th>Notes</th>
        </tr>
    </thead>
    <tbody id="table-body"></tbody>
</table>

</div>

<script>
let network = null;

function startScan() {
    document.getElementById("loading").style.display = "block";
    document.getElementById("loading-container").style.display = "block";
    document.getElementById("table-body").innerHTML = "";
    document.getElementById("stats").innerText = "";
    
    const progressBar = document.getElementById("progress-bar");
    const progressText = document.getElementById("progress-text");
    
    // Simulate progress
    let progress = 0;
    const interval = setInterval(() => {
        progress += Math.random() * 15;
        if (progress > 90) progress = 90;
        
        progressBar.style.width = progress + "%";
        progressText.innerText = Math.floor(progress) + "%";
    }, 200);

    fetch("/scan")
        .then(res => res.json())
        .then(data => {
            clearInterval(interval);
            
            // Complete the progress bar
            progressBar.style.width = "100%";
            progressText.innerText = "100%";
            
            setTimeout(() => {
                document.getElementById("loading").style.display = "none";
                document.getElementById("loading-container").style.display = "none";
                progressBar.style.width = "0%";
                progressText.innerText = "0%";
                
                document.getElementById("stats").innerText =
                    `[+] DEVICES DETECTED: ${data.length} | STATUS: ACTIVE`;

                renderTable(data);
                renderNetwork(data);
            }, 500);
        })
        .catch(err => {
            clearInterval(interval);
            document.getElementById("loading").style.display = "none";
            document.getElementById("loading-container").style.display = "none";
            progressBar.style.width = "0%";
            progressText.innerText = "0%";
            alert("Scan failed: " + err);
        });
}

function renderTable(data) {
    let tbody = document.getElementById("table-body");

    data.forEach(d => {
        let row = `<tr>
            <td><span style="color: var(--accent);">${d.ip}</span></td>
            <td>${d.hostname}</td>
            <td>${d.type}</td>
            <td>${d.ports.length ? d.ports.join(", ") : "<span style='opacity: 0.5;'>NULL</span>"}</td>
            <td>${d.note}</td>
        </tr>`;
        tbody.innerHTML += row;
    });
}

function renderNetwork(data) {
    let nodes = [];
    let edges = [];

    // Router node
    nodes.push({
        id: "router",
        label: "GATEWAY",
        shape: "box",
        color: {
            background: "#ff0040",
            border: "#ff0040"
        },
        font: {
            color: "#ffffff",
            face: "Share Tech Mono"
        }
    });

    data.forEach((d, i) => {
        let color = "#00d9ff";

        if (d.type.includes("Computer")) color = "#00ff41";
        if (d.type.includes("Phone")) color = "#ff00ff";
        if (d.type.includes("IoT")) color = "#ffff00";

        nodes.push({
            id: d.ip,
            label: d.ip,
            color: {
                background: color,
                border: color
            },
            font: {
                color: "#000000",
                face: "Share Tech Mono"
            }
        });

        edges.push({
            from: "router",
            to: d.ip,
            color: {
                color: color,
                opacity: 0.6
            },
            width: 2
        });
    });

    let container = document.getElementById("network");
    let graphData = {
        nodes: new vis.DataSet(nodes),
        edges: new vis.DataSet(edges)
    };

    let options = {
        physics: {
            stabilization: false,
            barnesHut: {
                gravitationalConstant: -8000,
                springConstant: 0.001,
                springLength: 200
            }
        },
        nodes: {
            shape: "dot",
            size: 25,
            borderWidth: 2
        }
    };

    if (network) network.destroy();
    network = new vis.Network(container, graphData, options);
}

function toggleDark() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
